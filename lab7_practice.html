<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

/* Gallery Container */
.gallery{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
}

/* Image Card */
.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    cursor:pointer;
    flex: 1 1 calc(33.33% - 20px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.caption{
    padding:10px;
    text-align:center;
    font-weight:bold;
}

/* Responsive Layout */

/* Medium screen */
@media (max-width:900px){
    .card{
        flex: 1 1 calc(50% - 20px);
    }
}

/* Small screen */
@media (max-width:600px){
    .card{
        flex: 1 1 100%;
    }
}

/* Modal Style */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}
.modal-content{
    background:white;
    padding:20px;
    border-radius:10px;
    text-align:center;
    position:relative;
}

.modal-content img{
    max-width:500px;
    width:100%;
}

.close{
    position:absolute;
    top:10px;
    right:15px;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
}

</style>
</head>

<body>

<h2>Responsive Image Gallery</h2>

<div class="gallery">

<div class="card">
<img src="https://picsum.photos/400/300?1">
<div class="caption">Beautiful Nature</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?2">
<div class="caption">Mountain View</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?3">
<div class="caption">City Lights</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?4">
<div class="caption">Sunset Beach</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?5">
<div class="caption">Forest Road</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?6">
<div class="caption">Snow Mountains</div>
</div>

</div>


<!-- Modal -->

<div class="modal" id="modal">
<div class="modal-content">
<span class="close">&times;</span>
<img id="modal-img">
</div>
</div>


<script>

const cards = document.querySelectorAll(".card img");
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");
const closeBtn = document.querySelector(".close");

cards.forEach(img=>{
    img.addEventListener("click",()=>{
        modal.style.display="flex";
        modalImg.src = img.src;
    });
});

closeBtn.onclick = function(){
    modal.style.display="none";
}

modal.onclick = function(e){
    if(e.target === modal){
        modal.style.display="none";
    }
}

</script>

</body>
</html>
