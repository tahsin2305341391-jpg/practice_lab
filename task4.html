<!DOCTYPE html>
<html>
<head>
<title>Task 5</title>
</head>
<body>

<h2>Background Color Changer</h2>

<button onclick="changeBg()">Click Here</button>

<p id="msg"></p>

<script>

function changeBg(){

document.body.style.backgroundColor = "lightblue";

document.getElementById("msg").innerHTML =
"Background color successfully changed.";

}

</script>

</body>
</html>
