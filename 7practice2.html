<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Small Screen Image Gallery</title>

<style>

/* Page Style */

body{
font-family: Arial;
margin:0;
padding:20px;
background:#f2f2f2;
text-align:center;
}

/* Gallery Container (Flexbox) */

.gallery{
display:flex;
flex-wrap:wrap;
gap:20px;
}

/* Card Style */
/* Small Layout → 1 image per row */

.card{
flex:1 1 100%;
background:white;
border-radius:8px;
box-shadow:0 4px 8px rgba(0,0,0,0.2);
overflow:hidden;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.caption{
padding:10px;
font-weight:bold;
}

</style>
</head>

<body>

<h2>Small Screen Image Gallery</h2>

<div class="gallery">

<div class="card">
<img src="https://picsum.photos/400/300?1">
<div class="caption">Nature</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?2">
<div class="caption">Mountain</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?3">
<div class="caption">City</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?4">
<div class="caption">Beach</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?5">
<div class="caption">Forest</div>
</div>

<div class="card">
<img src="https://picsum.photos/400/300?6">
<div class="caption">Snow</div>
</div>

</div>

</body>
</html>
